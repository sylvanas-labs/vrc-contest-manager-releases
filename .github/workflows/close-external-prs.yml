name: Close external PRs

on:
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  close:
    # Close PRs from anyone outside the repo's org/collab roster.
    # author_association reflects the PR author's relationship to the repo at the time the PR is opened.
    # OWNER, MEMBER, and COLLABORATOR are kept; everyone else (CONTRIBUTOR, FIRST_TIMER, NONE, etc.) is closed.
    if: github.event.pull_request.author_association != 'OWNER' && github.event.pull_request.author_association != 'MEMBER' && github.event.pull_request.author_association != 'COLLABORATOR'
    runs-on: ubuntu-latest
    steps:
      - run: gh pr close ${{ github.event.pull_request.number }} -R ${{ github.repository }} -c "This repository does not accept external pull requests."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
